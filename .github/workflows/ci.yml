name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up mise toolchain
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Sync dev environment
        run: uv sync --locked --group dev --python ${{ matrix.python-version }}

      - name: Run pre-commit
        run: uv run --no-sync --python ${{ matrix.python-version }} pre-commit run --all-files

  pytest:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up mise toolchain
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Sync dev environment
        run: uv sync --locked --group dev --python ${{ matrix.python-version }}

      - name: Run pytest
        run: uv run --no-sync --python ${{ matrix.python-version }} pytest

  ci:
    name: CI (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up mise toolchain
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Create release validation environment
        run: uv venv .release-venv --python ${{ matrix.python-version }}

      - name: Install built wheel
        run: uv pip install --python .release-venv/bin/python dist/*.whl

      - name: Run hello_world example
        working-directory: examples/hello_world
        run: ../../.release-venv/bin/python main.py

      - name: Verify output file was created
        run: |
          test -f examples/hello_world/hello_world.maxpat
          echo "hello_world.maxpat successfully created"

      - name: Display output file
        run: cat examples/hello_world/hello_world.maxpat
